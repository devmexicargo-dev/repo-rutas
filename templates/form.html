<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Optimización de Rutas V.2</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

h2 { margin-bottom: 20px; }

label { font-weight: bold; }

input, select {
    height: 38px;
    padding: 6px 8px;
    font-size: 14px;
    box-sizing: border-box;
}

/* Vehículos */
.vehiculos-select {
    width: 180px;
    margin-bottom: 20px;
}

/* Grid Ajustado para 5 columnas (Dirección, Inicio, Fin, Espera, Acción) */
.tabla-rutas {
    display: grid;
    grid-template-columns: 3fr 140px 140px 100px 50px;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
}

.header {
    font-weight: bold;
    background: #f1f1f1;
    padding: 8px;
    border-radius: 4px;
}

/* Botones */
.btn {
    padding: 10px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-add {
    background: #007bff;
    color: white;
    margin-bottom: 15px;
}

.btn-add:hover {
    background: #0056b3;
}

/* Botón Eliminar */
.btn-del {
    background: #dc3545;
    color: white;
    height: 38px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.btn-del:hover {
    background: #bd2130;
}

.btn-optimizar {
    margin-top: 30px;
    width: 100%;
    padding: 18px;
    font-size: 18px;
    background: linear-gradient(135deg, #1d6f42, #28a745);
    color: white;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.btn-optimizar:hover {
    background: linear-gradient(135deg, #155d34, #218838);
}

.header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.logo {
    height: 90px;
}
</style>
</head>

<body>

<div class="header-top">
    <h2>Optimización de Rutas V.2</h2>
    <img src="/static/Mexicargo_Logo.png" class="logo">
</div>

<form method="post" action="/optimize">

<!-- VEHÍCULOS -->
<label>Número de vehículos</label><br>
<select name="vehiculos" class="vehiculos-select">
    <option value="1">1 vehículo</option>
    <option value="2">2 vehículos</option>
    <option value="3">3 vehículos</option>
</select>

<br><br>

<!-- ACOPIO + HORA SALIDA -->
<label>Dirección de acopio</label>
<div class="tabla-rutas">
    <input type="text" name="acopio"
           value="107 Cedar Ave, Egg Harbor Township, NJ" required>

    <label style="text-align:right;">Hora salida:</label>
    <input type="time" name="hora_salida" value="06:00" required>

    <div></div>
    <div></div> <!-- Espacio para compensar el grid -->
</div>

<!-- HEADERS -->
<div class="tabla-rutas">
    <div class="header">📍 Dirección</div>
    <div class="header">🟢 Hora inicio</div>
    <div class="header">🔴 Hora fin</div>
    <div class="header">⏳ Espera (min)</div>
    <div class="header">🗑️</div>
</div>

<div id="contenedor-direcciones"></div>

<button type="button" class="btn btn-add" onclick="agregarFila()">
    ➕ Agregar dirección
</button>

<button type="submit" class="btn-optimizar">
    🚀 Optimizar ruta
</button>

</form>

<script>
let contador = 0;
const maxDirecciones = 19;

function agregarFila() {
    if (contador >= maxDirecciones) return;

    contador++;
    const contenedor = document.getElementById("contenedor-direcciones");
    
    const fila = document.createElement("div");
    fila.className = "tabla-rutas";
    // Asignamos un ID único para poder identificarla al borrar
    fila.id = "fila-" + Date.now(); 

    fila.innerHTML = `
        <input type="text" name="direccion" placeholder="Dirección" required>
        <input type="time" name="hora_inicio" value="06:00" required>
        <input type="time" name="hora_fin" value="18:00" required>
        <input type="number" name="espera" value="5" min="1" max="120" required>
        <button type="button" class="btn btn-del" onclick="eliminarFila('${fila.id}')">✖</button>
    `;

    contenedor.appendChild(fila);
}

function eliminarFila(idFila) {
    const contenedor = document.getElementById("contenedor-direcciones");
    
    // Verificamos que haya más de una fila
    if (contenedor.children.length > 1) {
        const fila = document.getElementById(idFila);
        fila.remove();
    } else {
        alert("Atención: Debe haber al menos una dirección en la ruta.");
    }
}

// Inicializar con la primera fila
agregarFila();
</script>

</body>
</html>
